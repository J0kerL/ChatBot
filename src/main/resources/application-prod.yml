spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chat_bot?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Diamond1234.
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis 配置 - 生产环境
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 5
  ai:
    anthropic:
      # API 基础地址
      base-url: YOUR_API_BASE_URL
      # API 密钥（从环境变量读取，如果没有则使用默认值）
      api-key: ${ANTHROPIC_API_KEY:YOUR_API_KEY}
      chat:
        options:
          # 模型名称
          model: ${ANTHROPIC_MODEL:claude-opus-4-6}
          # 温度参数 (0.0-1.0)
          temperature: 0.7
          # 最大 token 数
          max-tokens: 2000

# 生产环境日志级别
logging:
  level:
    root: warn
    com.chatbot: info
    com.chatbot.mapper: warn
  file:
    name: /home/diamond/chatbot/logs/chatbot.log
    max-size: 50MB
    max-history: 7
