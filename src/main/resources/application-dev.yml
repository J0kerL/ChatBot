spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chat_bot?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 1234

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 1234
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  ai:
    anthropic:
      # API 基础地址
      base-url: YOUR_API_BASE_URL
      # API 密钥（从环境变量读取，如果没有则使用默认值）
      api-key: ${ANTHROPIC_API_KEY:YOUR_API_KEY}
      chat:
        options:
          # 模型名称
          model: ${ANTHROPIC_MODEL:claude-opus-4-6}
          # 温度参数 (0.0-1.0)
          temperature: 0.7
          # 最大 token 数
          max-tokens: 2000

# 开发环境日志级别
logging:
  level:
    root: info
    com.chatbot: debug
    com.chatbot.mapper: debug
